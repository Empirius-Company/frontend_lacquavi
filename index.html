    <!-- Local Business Schema (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Lacqua",
      "alternateName": ["Lacqua Minas Shopping", "Perfumaria Lacqua"],

      "url": "https://lacquaminas.com.br",
      "telephone": "+55 31 97501-9000",
      "email": "contato@lacquaminas.com.br",
      "image": "https://lacquaminas.com.br/logo.png",
      "logo": {
        "@type": "ImageObject",
        "url": "https://lacquaminas.com.br/logo.png"
      },
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Minas Shopping",
        "addressLocality": "Belo Horizonte",
        "addressRegion": "MG",
        "postalCode": "31160-900",
        "addressCountry": "BR"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": "-19.9106642",
        "longitude": "-43.9269849"
      },
      "priceRange": "R$ 100 - R$ 2000",
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
          "opens": "10:00",
          "closes": "22:00"
        },
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": "Saturday",
          "opens": "10:00",
          "closes": "22:00"
        }
      ],
      "sameAs": [
        "https://www.instagram.com/lacqua.minas"
      ],
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://lacquaminas.com.br/search?q={search_term_string}"
        }
      }
    }
    </script>
    
    <!-- Google Features -->
    <link rel="canonical" href="https://lacquaminas.com.br" />
    <link rel="alternate" hreflang="pt-BR" href="https://lacquaminas.com.br" />

    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <!-- Preload LCP image — mobile gets smaller variant via imagesrcset -->

      imagesrcset="/banner-home-top-mobile.webp 700w, /banner-home-top.webp 1400w"

      fetchpriority="high" />
